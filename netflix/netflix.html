<!DOCTYPE html>
<html>
<head>
    <title>Netflix Button</title>

    <style>
        body{
            background-color: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        button{
            background-color: #E50914;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background-color: #F40612;
        }
    </style>
</head>

<body>

    <button>Netflix</button>

</body>
</html>
